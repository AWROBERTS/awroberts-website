apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-bad-paths
  namespace: {{ .Release.Namespace }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: websecure-root

  hostnames:
    - "awroberts.co.uk"

  rules:
    - matches:
        - path:
            type: Exact
            value: "/xmlrpc.php"
        - path:
            type: PathPrefix
            value: "/wp-"
        - path:
            type: PathPrefix
            value: "/update_weights"
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /404
            statusCode: 302