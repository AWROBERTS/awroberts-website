apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "awroberts-web.fullname" . }}-http
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - web
  routes:
{{- range .Values.traefik.hostnames }}
    - match: Host(`{{ . }}`) && PathPrefix(`/`)
      kind: Rule
      middlewares:
        - name: {{ include "awroberts-web.fullname" $ }}-redirect-https
          namespace: {{ $.Release.Namespace }}
      services:
        - name: {{ include "awroberts-web.fullname" $ }}
          port: {{ $.Values.service.port }}
          serversTransport: {{ include "awroberts-web.fullname" $ }}-transport
{{- end }}