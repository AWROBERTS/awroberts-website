apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: block-non-domain
  namespace: {{ .Values.gateway.namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https-root
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https-wildcard

  # No hostnames → matches anything not claimed by your app route
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: noop@internal
          kind: TraefikService
