apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: https
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: http
  hostnames:
    - {{ index .Values.traefik.hostnames 0 }}   # awroberts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: hsts
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: static-cache
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: security-headers
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}
          port: {{ .Values.service.port }}
