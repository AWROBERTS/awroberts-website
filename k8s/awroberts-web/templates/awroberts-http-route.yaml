apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: https
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: http

  hostnames:
    - {{ index .Values.traefik.hostnames 0 }}   # awroberts.co.uk
    - {{ index .Values.traefik.hostnames 1 }}   # www.awroberts.co.uk

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}
          port: {{ .Values.service.port }}
