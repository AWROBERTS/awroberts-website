apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "awroberts.name" . }}-background
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backgroundVideo.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "awroberts.name" . }}-background
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "awroberts.name" . }}-background
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/nginx-conf: {{ include (print $.Template.BasePath "/video-nginx-config-map.yaml") . | sha256sum }}
    spec:
      containers:
        - name: {{ include "awroberts.name" . }}-background
          image: "{{ .Values.backgroundVideo.nginx.image.repository }}:{{ .Values.backgroundVideo.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.nginx.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.nginx.listenPort | default 80 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.nginx.listenPort | default 80 }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.nginx.listenPort | default 80 }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: media-volume
              mountPath: {{ .Values.media.mountPath }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "awroberts.name" . }}-background-nginx
        - name: media-volume
          hostPath:
            path: {{ .Values.media.hostPath }}
            type: Directory
