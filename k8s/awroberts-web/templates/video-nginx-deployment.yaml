apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background
    app.kubernetes.io/instance: {{ .Release.Name }}

spec:
  replicas: {{ .Values.backgroundVideo.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/nginx-conf: {{ include (print $.Template.BasePath "/video-nginx-config-map.yaml") . | sha256sum }}

    spec:
      nodeSelector:
        arch: arm

      containers:
        - name: {{ include "awroberts.fullname" . }}-background
          image: "{{ .Values.backgroundVideo.nginx.image.repository }}:{{ .Values.backgroundVideo.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.nginx.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.nginx.listenPort | default 80 }}

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.nginx.listenPort | default 80 }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.nginx.listenPort | default 80 }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}

          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf

            - name: hls-output-media
              mountPath: /var/www/html/awroberts/awroberts-media

            - name: hls-output-hls
              mountPath: {{ .Values.backgroundVideo.hls.outputDir }}

      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "awroberts.fullname" . }}-background-nginx

        - name: hls-output-media
          hostPath:
            path: {{ .Values.backgroundVideo.nginx.volume.hostPath }}
            type: DirectoryOrCreate

        - name: hls-output-hls
          hostPath:
            path: {{ .Values.backgroundVideo.hls.outputDir }}
            type: DirectoryOrCreate
