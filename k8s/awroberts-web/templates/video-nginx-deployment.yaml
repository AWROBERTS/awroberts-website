apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "awroberts.fullname" . }}-background
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "awroberts.fullname" . }}-background
  template:
    metadata:
      labels:
        app: {{ include "awroberts.fullname" . }}-background
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.backgroundVideo.nginx.image.repository }}:{{ .Values.backgroundVideo.nginx.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.nginx.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}

          volumeMounts:
            - name: hls-output
              mountPath: {{ .Values.backgroundVideo.hls.outputDir }}

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}

          resources:
            requests:
              cpu: {{ .Values.backgroundVideo.resources.nginx.requests.cpu }}
              memory: {{ .Values.backgroundVideo.resources.nginx.requests.memory }}
            limits:
              cpu: {{ .Values.backgroundVideo.resources.nginx.limits.cpu }}
              memory: {{ .Values.backgroundVideo.resources.nginx.limits.memory }}

      volumes:
        - name: hls-output
          hostPath:
            path: {{ .Values.backgroundVideo.hls.outputDir }}
            type: DirectoryOrCreate
