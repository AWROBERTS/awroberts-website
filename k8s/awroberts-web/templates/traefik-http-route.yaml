apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: awroberts-route
  namespace: awroberts
spec:
  parentRefs:
    - name: awroberts-gateway
      sectionName: https
  hostnames:
    - awroberts.co.uk
    - www.awroberts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: strict-transport-security
                value: "max-age=31536000; includeSubDomains"
              - name: x-frame-options
                value: "DENY"
              - name: x-content-type-options
                value: "nosniff"
              - name: x-xss-protection
                value: "1; mode=block"
      backendRefs:
        - name: awroberts-web-deploy
          port: 80
