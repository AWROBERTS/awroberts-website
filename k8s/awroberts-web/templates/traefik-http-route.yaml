apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: https
  hostnames:
    {{- range .Values.traefik.hostnames }}
    - {{ . }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: strict-transport-security
                value: "max-age={{ .Values.traefik.hsts.maxAge }}{{ if .Values.traefik.hsts.includeSubdomains }}; includeSubDomains{{ end }}"
              - name: x-frame-options
                value: "DENY"
              - name: x-content-type-options
                value: "nosniff"
              - name: x-xss-protection
                value: "1; mode=block"
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}
          port: {{ .Values.service.port }}
