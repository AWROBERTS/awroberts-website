apiVersion: v1
kind: ConfigMap
metadata:
    name: {{ include "awroberts-web.name" . }}-nginx

data:
  nginx.conf: |
    worker_processes {{ .Values.nginx.workerProcesses }};

    events {
        worker_connections {{ .Values.nginx.workerConnections }};
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        types {
            {{ .Values.nginx.mimeTypes.ttf }} ttf;
            {{ .Values.nginx.mimeTypes.otf }} otf;
            {{ .Values.nginx.mimeTypes.woff }} woff;
            {{ .Values.nginx.mimeTypes.woff2 }} woff2;
        }

        sendfile on;
        keepalive_timeout {{ .Values.nginx.keepaliveTimeout }};

        server {
            listen {{ .Values.nginx.listenPort }};
            listen [::]:{{ .Values.nginx.listenPort }};
            server_name "{{ .Values.nginx.serverName }}";

            root "{{ .Values.nginx.root }}";
            index "{{ .Values.nginx.index }}";

            # Liveness / Readiness probe
            location "{{ .Values.livenessProbe.httpGet.path }}" {
                return 200;
            }

            # JSON files
            location ~* \.json$ {
                default_type application/json;
                try_files $uri =404;
            }

            # Background poster
            location = "{{ .Values.media.publicBackgroundPosterPath }}" {
                alias "{{ .Values.media.mountPath }}/{{ .Values.media.backgroundPosterFile }}";
                add_header Cache-Control "{{ .Values.media.backgroundPosterCacheControl }}";
            }

            # Font file
            location = "{{ .Values.media.publicFontPath }}" {
                alias "{{ .Values.media.mountPath }}/{{ .Values.media.fontFile }}";
                add_header Cache-Control "{{ .Values.media.fontCacheControl }}";
            }

            # HLS stream
            location {{ .Values.media.publicStreamPath }}/ {
                alias {{ .Values.media.mountPath }}/{{ .Values.media.streamDir }}/;
                add_header Cache-Control "no-cache";
            }

            # Static assets
            location {{ .Values.assets.publicPath }}/ {
                alias {{ .Values.assets.mountPath }}/;
                add_header Cache-Control "public, max-age=31536000";
            }

            # Main site
            location / {
                try_files $uri $uri/ "/{{ .Values.nginx.index }}";
            }
        }
    }
