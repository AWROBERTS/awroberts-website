apiVersion: v1
kind: PersistentVolume
metadata:
  name: awroberts-web-deploy-background-hls-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /var/www/html/awroberts/awroberts-media/hls
    type: DirectoryOrCreate
  claimRef:
    namespace: awroberts
    name: awroberts-web-deploy-background-hls