apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https-root
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https-wildcard
    - name: {{ include "awroberts.fullname" . }}-gateway
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http

  hostnames:
    - awroberts.co.uk

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /stream
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: no-cache-hls
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-background
          port: 80
