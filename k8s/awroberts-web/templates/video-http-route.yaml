apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-background
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | default "awroberts-web-deploy-gateway" }}
      namespace: {{ .Values.gateway.namespace | default "traefik" }}
  hostnames:
{{ toYaml .Values.traefik.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.stream.pathPrefix | default "/stream" }}
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-background
          port: {{ .Values.service.port | default 80 }}
