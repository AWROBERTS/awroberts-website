apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: https-root

  hostnames:
    {{- range .Values.traefik.hostnames }}
    - {{ . }}
    {{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.stream.pathPrefix }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: no-cache-hls
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-background
          port: {{ .Values.service.port }}
