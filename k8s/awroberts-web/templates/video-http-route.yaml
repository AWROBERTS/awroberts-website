apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-videos
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - awroberts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /media/
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-videos
          port: 80
