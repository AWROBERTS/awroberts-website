apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-background
spec:
  parentRefs:
    - name: awroberts-web-deploy-gateway
      namespace: awroberts
  hostnames:
    - awroberts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /media/
      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-background
          port: 80
