apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-background-route
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: websecure-root

  hostnames:
{{- range .Values.traefik.hostnames }}
    - {{ . | quote }}
{{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.stream.pathPrefix | quote }}

      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: no-cache-hls

      backendRefs:
        - name: {{ include "awroberts.fullname" . }}-background
          port: {{ .Values.containerPort }}
