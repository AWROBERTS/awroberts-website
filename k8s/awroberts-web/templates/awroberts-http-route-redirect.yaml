apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-www-redirect
  namespace: {{ .Release.Namespace }}

spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: websecure-wildcard

  hostnames:
    - "www.awroberts.co.uk"

  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            hostname: awroberts.co.uk
            statusCode: 301
