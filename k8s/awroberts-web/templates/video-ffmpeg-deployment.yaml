apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background-ffmpeg
  labels:
    app: {{ include "awroberts.fullname" . }}-background-ffmpeg
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "awroberts.fullname" . }}-background-ffmpeg
  template:
    metadata:
      labels:
        app: {{ include "awroberts.fullname" . }}-background-ffmpeg
    spec:
      restartPolicy: Always
      containers:
        - name: ffmpeg-live
          image: "{{ .Values.backgroundVideo.ffmpeg.image.repository }}:{{ .Values.backgroundVideo.ffmpeg.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.ffmpeg.image.pullPolicy }}

          command: ["/bin/sh", "-c"]
          args:
            - >
              SOURCE="{{ .Values.backgroundVideo.source }}";
              OUTPUT_DIR="{{ .Values.backgroundVideo.hls.outputDir }}";
              OUTPUT="$OUTPUT_DIR/index.m3u8";

              mkdir -p "$OUTPUT_DIR";

              ffmpeg -re -stream_loop -1 -i "$SOURCE" \
                -map 0:v:0 \
                -c:v copy \
                -f hls \
                -hls_time {{ .Values.backgroundVideo.hls.segmentDuration }} \
                -hls_list_size {{ .Values.backgroundVideo.hls.liveWindow }} \
                -hls_allow_cache 0 \
                -hls_flags delete_segments+append_list \
                -hls_segment_filename "$OUTPUT_DIR/{{ .Values.backgroundVideo.hls.liveSegmentPrefix }}%05d.ts" \
                "$OUTPUT";

          volumeMounts:
            - name: media-volume
              mountPath: {{ .Values.volume.mountPath }}

          resources:
            {{- toYaml .Values.backgroundVideo.resources.ffmpeg | nindent 12 }}

        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.containerPort }}
              protocol: TCP

          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}

          volumeMounts:
            - name: media-volume
              mountPath: {{ .Values.volume.mountPath }}

      volumes:
        - name: media-volume
          hostPath:
            path: {{ .Values.volume.hostPath }}
            type: DirectoryOrCreate
