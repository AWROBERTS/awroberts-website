apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background-ffmpeg
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background-ffmpeg
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: background-ffmpeg

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background-ffmpeg
      app.kubernetes.io/component: background-ffmpeg
      app.kubernetes.io/instance: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "awroberts.fullname" . }}-background-ffmpeg
        app.kubernetes.io/component: background-ffmpeg
        app.kubernetes.io/instance: {{ .Release.Name }}

    spec:
      containers:
        - name: ffmpeg
          image: "{{ .Values.backgroundVideo.ffmpeg.image.repository }}:{{ .Values.backgroundVideo.ffmpeg.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.ffmpeg.image.pullPolicy }}

          command:
            - /bin/sh
            - -c
            - >
              mkdir -p {{ .Values.backgroundVideo.hls.outputDir }} &&

              (
                while true; do
                  latest_segment="$(ls -1t {{ .Values.backgroundVideo.hls.outputDir }}/{{ .Values.backgroundVideo.hls.liveSegmentPrefix }}*.ts 2>/dev/null | sed -n '2p')";

                  if [ -n "$latest_segment" ] && [ -f "$latest_segment" ]; then
                    ffmpeg -y
                    -loglevel error
                    -i "$latest_segment"
                    -frames:v 1
                    /tmp/background-poster.png
                    &&
                    mv /tmp/background-poster.png /var/www/html/awroberts/awroberts-media/background-poster.png;
                  fi;

                  sleep 10;
                done
              ) &

              exec ffmpeg -y
              -re
              -stream_loop -1
              -i {{ .Values.backgroundVideo.source }}
              -c copy
              -f hls
              -hls_time {{ .Values.backgroundVideo.hls.segmentDuration }}
              -hls_list_size {{ .Values.backgroundVideo.hls.liveWindow }}
              -hls_flags delete_segments
              -hls_segment_filename "{{ .Values.backgroundVideo.hls.outputDir }}/{{ .Values.backgroundVideo.hls.liveSegmentPrefix }}%03d.ts"
              "{{ .Values.backgroundVideo.hls.outputDir }}/index.m3u8"

          volumeMounts:
            - name: hls-input
              mountPath: /usr/share/nginx/html/hls

            - name: hls-output
              mountPath: /var/www/html/awroberts/awroberts-media

          resources:
            requests:
              cpu: {{ .Values.backgroundVideo.resources.ffmpeg.requests.cpu }}
              memory: {{ .Values.backgroundVideo.resources.ffmpeg.requests.memory }}
            limits:
              cpu: {{ .Values.backgroundVideo.resources.ffmpeg.limits.cpu }}
              memory: {{ .Values.backgroundVideo.resources.ffmpeg.limits.memory }}

      volumes:
        - name: hls-input
          hostPath:
            path: {{ .Values.media.hostPath }}/hls
            type: Directory

        - name: hls-output
          hostPath:
            path: {{ .Values.backgroundVideo.nginx.volume.hostPath }}
            type: DirectoryOrCreate