apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  labels:
    app: {{ include "awroberts.fullname" . }}-background
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "awroberts.fullname" . }}-background
  template:
    metadata:
      labels:
        app: {{ include "awroberts.fullname" . }}-background
    spec:
      initContainers:
        # -------------------------
        # FFMPEG (generates VOD HLS)
        # -------------------------
        - name: ffmpeg
          image: "{{ .Values.backgroundVideo.ffmpeg.image.repository }}:{{ .Values.backgroundVideo.ffmpeg.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.ffmpeg.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              ffmpeg -y -i /var/www/html/awroberts/awroberts-media/{{ .Values.backgroundVideo.video.filename }}
              -c:v libx264 -preset slow -profile:v high -level 5.1
              -crf 17 -maxrate 25M -bufsize 50M
              -g 120 -keyint_min 120 -sc_threshold 0
              -c:a aac -ar 48000 -b:a 192k
              -f hls
              -hls_time {{ .Values.backgroundVideo.hls.segmentDuration }}
              -hls_playlist_type vod
              -hls_segment_filename /output/seg_%05d.ts
              /output/index.m3u8
          volumeMounts:
            - name: hls
              mountPath: /output
            - name: media-volume
              mountPath: /var/www/html/awroberts/awroberts-media

      containers:
        # -------------------------
        # NGINX (serves HLS output)
        # -------------------------
        - name: nginx
          image: "{{ .Values.backgroundVideo.image.repository }}:{{ .Values.backgroundVideo.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: hls
              mountPath: /usr/share/nginx/html/stream
            - name: media-volume
              mountPath: /var/www/html/awroberts/awroberts-media
          readinessProbe:
            httpGet:
              path: /stream/index.m3u8
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

      # -------------------------
      # VOLUMES
      # -------------------------
      volumes:
        - name: hls
          emptyDir: {}
        - name: media-volume
          hostPath:
            path: {{ .Values.backgroundVideo.volume.hostPath }}
            type: DirectoryOrCreate