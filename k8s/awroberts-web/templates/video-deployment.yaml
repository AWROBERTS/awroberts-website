apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "awroberts.fullname" . }}-background
  labels:
    app: {{ include "awroberts.fullname" . }}-background
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "awroberts.fullname" . }}-background
  template:
    metadata:
      labels:
        app: {{ include "awroberts.fullname" . }}-background
    spec:
      containers:

        # -------------------------
        # NGINX (serves HLS output)
        # -------------------------
        - name: nginx
          image: "{{ .Values.backgroundVideo.image.repository }}:{{ .Values.backgroundVideo.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: hls
              mountPath: /usr/share/nginx/html/stream

            {{- if .Values.backgroundVideo.volume.useHostPath }}
            - name: media-volume
              mountPath: /var/www/html/awroberts/awroberts-media
            {{- end }}

        # -------------------------
        # FFMPEG (generates HLS)
        # -------------------------
        - name: ffmpeg
          image: "{{ .Values.backgroundVideo.ffmpeg.image.repository }}:{{ .Values.backgroundVideo.ffmpeg.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.ffmpeg.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              ffmpeg -stream_loop -1
              -i /var/www/html/awroberts/awroberts-media/{{ .Values.backgroundVideo.video.filename }}
              -c:v libx264 -preset veryfast -b:v 3000k
              -c:a aac -ar 44100 -b:a 128k
              -f hls
              -hls_time {{ .Values.backgroundVideo.hls.segmentDuration }}
              -hls_list_size {{ .Values.backgroundVideo.hls.playlistSize }}
              -hls_flags delete_segments
              /output/index.m3u8
          volumeMounts:
            - name: hls
              mountPath: /output

            {{- if .Values.backgroundVideo.volume.useHostPath }}
            - name: media-volume
              mountPath: /var/www/html/awroberts/awroberts-media
            {{- end }}

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /output/index.m3u8 || test -f /output/index.m3u8.tmp
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test $(ls -1 /output/index*.ts 2>/dev/null | wc -l) -gt 0
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

      # -------------------------
      # VOLUMES
      # -------------------------
      volumes:
        - name: hls
          emptyDir: {}

        {{- if .Values.backgroundVideo.volume.useHostPath }}
        - name: media-volume
          hostPath:
            path: {{ .Values.backgroundVideo.volume.hostPath }}
            type: DirectoryOrCreate
        {{- end }}
