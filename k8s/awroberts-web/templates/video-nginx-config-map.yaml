apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "awroberts.name" . }}-background-nginx
data:
  nginx.conf: |
    worker_processes {{ .Values.nginx.workerProcesses | default 1 }};

    events {
        worker_connections {{ .Values.nginx.workerConnections | default 1024 }};
    }

    http {
        include mime.types;
        default_type application/octet-stream;

        sendfile on;
        keepalive_timeout {{ .Values.nginx.keepaliveTimeout | default 65 }};

        server {
            listen {{ .Values.nginx.listenPort | default 80 }};
            listen [::]:{{ .Values.nginx.listenPort | default 80 }};
            server_name "_";

            # Serve HLS output directory
            root "{{ .Values.backgroundVideo.hls.outputDir }}";

            # Health check
            location "{{ .Values.livenessProbe.httpGet.path }}" {
                return 200;
            }

            # Poster image (served from same HLS directory)
            location = /background-poster.png {
                alias /var/www/html/awroberts/awroberts-media/background-poster.png;
                add_header Cache-Control "no-cache";
            }

            # Serve all HLS files directly
            location / {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
                try_files $uri =404;
            }
        }
    }
