apiVersion: v1
kind: ConfigMap
metadata:
  name: awroberts-web-background-nginx
data:
  nginx.conf: |
    worker_processes {{ .Values.nginx.workerProcesses | default 1 }};

    events {
        worker_connections {{ .Values.nginx.workerConnections | default 1024 }};
    }

    http {
        include       mime.types;
        default_type  application/octet-stream;

        sendfile on;
        keepalive_timeout {{ .Values.nginx.keepaliveTimeout | default 65 }};

        server {
            listen {{ .Values.nginx.listenPort | default 80 }};
            listen [::]:{{ .Values.nginx.listenPort | default 80 }};
            server_name "_";

            root "{{ .Values.backgroundVideo.hls.outputDir }}";

            location "{{ .Values.livenessProbe.httpGet.path }}" {
                return 200;
            }

            location / {
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
                try_files $uri =404;
            }
        }
    }
