apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "awroberts.fullname" . }}-gateway
  namespace: traefik

spec:
  gatewayClassName: traefik

  listeners:
    - name: https-root
      protocol: HTTPS
      port: 8443
      hostname: "awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: All

    - name: https-wildcard
      protocol: HTTPS
      port: 8443
      hostname: "*.awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: All

    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
