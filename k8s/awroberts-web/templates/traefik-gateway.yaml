apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "awroberts.fullname" . }}-gateway
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    "helm.sh/resource-policy": keep

spec:
  gatewayClassName: traefik

  listeners:
    # HTTPS for root domain
    - name: https-root
      protocol: HTTPS
      port: 8443
      hostname: "awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: All

    # HTTPS for wildcard subdomains
    - name: https-wildcard
      protocol: HTTPS
      port: 8443
      hostname: "*.awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: All

    # Catch‑all HTTPS listener
    # Fixes routers that strip or rewrite Host headers.
    # Ensures Traefik always uses real TLS cert.
    - name: https-catchall
      protocol: HTTPS
      port: 8443
      hostname: "*"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
      allowedRoutes:
        namespaces:
          from: All

    # HTTP listener
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: All
