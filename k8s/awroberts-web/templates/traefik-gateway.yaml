apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "awroberts.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  annotations:
    metallb.io/address-pool: awroberts-pool
spec:
  gatewayClassName: traefik

  addresses:
    - type: IPAddress
      value: 192.168.1.150

  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ index .Values.traefik.hostnames 0 }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
            namespace: {{ .Release.Namespace }}

    - name: https-www
      protocol: HTTPS
      port: 443
      hostname: {{ index .Values.traefik.hostnames 1 }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
            namespace: {{ .Release.Namespace }}

    - name: http
      protocol: HTTP
      port: 80

