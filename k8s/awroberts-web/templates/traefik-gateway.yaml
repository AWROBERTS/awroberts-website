apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "awroberts.fullname" . }}-gateway
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    "helm.sh/resource-policy": keep

spec:
  gatewayClassName: {{ .Values.gateway.className }}

  listeners:
    - name: websecure-root
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostnames.root | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: All

    - name: websecure-wildcard
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostnames.wildcard | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: All

    - name: web
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
