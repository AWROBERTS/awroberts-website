apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "awroberts.fullname" . }}-gateway
  namespace: traefik

spec:
  gatewayClassName: traefik

  addresses:
    - type: IPAddress
      value: {{ .Values.traefik.loadBalancerIP }}

  listeners:
    - name: https-root
      protocol: HTTPS
      port: 443
      hostname: "awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}

    - name: https-wildcard
      protocol: HTTPS
      port: 443
      hostname: "*.awroberts.co.uk"
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.traefik.tls.secretName }}

    - name: http
      protocol: HTTP
      port: 80
