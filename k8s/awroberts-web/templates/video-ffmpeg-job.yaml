apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "awroberts.fullname" . }}-background-encode
  labels:
    app: {{ include "awroberts.fullname" . }}-background-encode
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: {{ include "awroberts.fullname" . }}-background-encode
    spec:
      restartPolicy: Never
      containers:
        - name: ffmpeg
          image: "{{ .Values.backgroundVideo.ffmpeg.image.repository }}:{{ .Values.backgroundVideo.ffmpeg.image.tag }}"
          imagePullPolicy: {{ .Values.backgroundVideo.ffmpeg.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - >
              SOURCE="/var/www/html/awroberts/awroberts-media/{{ .Values.backgroundVideo.video.filename }}";
              OUTPUT_DIR="/output";
              OUTPUT="$OUTPUT_DIR/index.m3u8";

              mkdir -p "$OUTPUT_DIR";
              rm -f "$OUTPUT_DIR"/seg_*.ts "$OUTPUT" || true;

              ffmpeg -y -i "$SOURCE" \
                -c:v libx264 -preset slow -profile:v high -level 5.1 \
                -crf 17 -maxrate 25M -bufsize 50M \
                -g 120 -keyint_min 120 -sc_threshold 0 \
                -an \
                -f hls \
                -hls_time {{ .Values.backgroundVideo.hls.segmentDuration }} \
                -hls_playlist_type vod \
                -hls_segment_filename "$OUTPUT_DIR/seg_%05d.ts" \
                "$OUTPUT"
          volumeMounts:
            - name: hls
              mountPath: /output
            - name: media-volume
              mountPath: /var/www/html/awroberts/awroberts-media
      volumes:
        - name: hls
          persistentVolumeClaim:
            claimName: {{ include "awroberts.fullname" . }}-background-hls
        - name: media-volume
          hostPath:
            path: {{ .Values.backgroundVideo.volume.hostPath }}
            type: DirectoryOrCreate