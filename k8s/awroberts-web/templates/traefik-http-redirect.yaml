apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: http
  hostnames:
    {{- range .Values.traefik.hostnames }}
    - {{ . }}
    {{- end }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
