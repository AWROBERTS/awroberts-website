apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: awroberts-redirect
  namespace: awroberts
spec:
  parentRefs:
    - name: awroberts-gateway
      sectionName: http
  hostnames:
    - awroberts.co.uk
    - www.awroberts.co.uk
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
