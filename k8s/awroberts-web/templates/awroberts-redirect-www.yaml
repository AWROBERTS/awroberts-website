apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "awroberts.fullname" . }}-redirect
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: https-www
    - name: {{ include "awroberts.fullname" . }}-gateway
      sectionName: http
  hostnames:
    - {{ index .Values.traefik.hostnames 1 }}   # www.awroberts.co.uk
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ExtensionRef
          extensionRef:
            group: traefik.io
            kind: Middleware
            name: redirect-www
      backendRefs: []   # No backend — redirect only
