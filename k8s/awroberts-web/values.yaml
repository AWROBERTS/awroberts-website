replicaCount: 1

image:
  repository: awroberts
  tag: latest
  pullPolicy: Never

traefik:
  hostnames:
    - awroberts.co.uk
    - www.awroberts.co.uk
  tls:
    secretName: awroberts-tls
  hsts:
    maxAge: 31536000
    includeSubdomains: true

volume:
  hostPath: /var/www/html/awroberts/awroberts-media
  mountPath: /usr/share/nginx/html/awroberts-media

containerPort: 80

resources: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: 80
  initialDelaySeconds: 2
  periodSeconds: 5

service:
  type: ClusterIP
  port: 80
  portName: http
  protocol: TCP

autoscaling:
  enabled: false

backgroundVideo:
  image:
    repository: background-video
    tag: latest
    pullPolicy: Never

  ffmpeg:
    image:
      repository: jrottenberg/ffmpeg
      tag: "4.4-alpine"
      pullPolicy: IfNotPresent

  video:
    filename: "background.mp4"

  hls:
    segmentDuration: 4
    playlistSize: 8

  volume:
    useHostPath: false
    hostPath: "/var/www/html/awroberts/awroberts-media"

  resources:
    nginx: {}
    ffmpeg: {}
