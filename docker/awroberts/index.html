<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>awroberts</title>

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="assets/favicon.png">

  <!-- Basic SEO -->
  <meta name="description" content="awroberts — portfolio">

  <!-- Open Graph (Link Previews) -->
  <meta property="og:title" content="awroberts">
  <meta property="og:description" content="portfolio">
  <meta property="og:image" content="https://awroberts.co.uk/background-poster.png">
  <meta property="og:url" content="https://awroberts.co.uk/">
  <meta property="og:type" content="website">

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/p5@2.3.0/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"></script>
</head>

<body>
  <video id="bg-video"
         muted
         playsinline
         autoplay
         crossorigin="anonymous"
         style="
           position:absolute;
           top:0;
           left:0;
           width:1px;
           height:1px;
           opacity:0;
           z-index:-1;
         ">
  </video>

  <div id="canvas-container"></div>

  <!-- Correct way to load a p5 module -->
  <script type="module">
    import sketch from "/sketch/sketch.js";
    new p5(sketch);
  </script>

</body>
</html>
