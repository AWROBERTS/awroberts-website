<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>awroberts</title>

  <link rel="stylesheet" href="style.css" />

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

  <!-- hls.js for cross‑browser HLS playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>

  <!--
    IMPORTANT:
    Safari + Chrome WILL NOT DECODE VIDEO FRAMES if the element is display:none.
    It must remain "renderable" for the decoder to work.
    So we move it off-screen instead of hiding it.
  -->
  <video id="bg-video"
         muted
         playsinline
         autoplay
         style="
           position:absolute;
           left:-9999px;
           top:-9999px;
           width:1px;
           height:1px;
         ">
  </video>

  <div id="canvas-container"></div>

  <script src="sketch.js"></script>
</body>
</html>
