<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audio Test</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #canvas-container {
        width: 100vw;
        height: 100vh;
      }

      #start-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.72);
        z-index: 20;
      }

      #start-button {
        font-family: sans-serif;
        font-size: 1.1rem;
        padding: 1rem 1.4rem;
        border: 1px solid rgba(255,255,255,0.8);
        background: rgba(20, 20, 20, 0.9);
        color: white;
        cursor: pointer;
        border-radius: 999px;
      }

      #start-button:hover {
        background: rgba(50, 50, 50, 0.95);
      }
    </style>
  </head>
  <body>
    <div id="canvas-container"></div>
    <div id="start-overlay">
      <button id="start-button">Start Sound</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="audio-test.js"></script>
  </body>
</html>
