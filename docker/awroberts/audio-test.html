<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>awroberts</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>

      padding: 0;

      width: 100vw;
      height: 100vh;

<body>
  <video id="bg-video"
         muted
         playsinline

         style="

           left: -9999px;

           width: 320px;
           height: 180px;
           opacity: 0;
           pointer-events: none;
         ">
  </video>

  <div id="canvas-container"></div>

  <script defer src="audio-test.js"></script>
