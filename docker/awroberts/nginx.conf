worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # SPA root
        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            return 200;
        }

        # JSON files should not fall back to index.html
        location ~* \.json$ {
            default_type application/json;
            try_files $uri =404;
        }

        # Fallback image
        location = {{ .Values.assets.fallbackImagePublicPath }} {
            alias {{ .Values.media.mountPath }}/{{ .Values.assets.fallbackImage }};
            add_header Cache-Control "public, max-age=604800" always;
        }

        # Font caching
        location = {{ .Values.assets.fontPublicPath }} {
            alias {{ .Values.media.mountPath }}/{{ .Values.assets.fontFile }};
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
