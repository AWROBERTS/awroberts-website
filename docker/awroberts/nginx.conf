worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        listen [::]:80;
        server_name awroberts.co.uk www.awroberts.co.uk;

        root /usr/share/nginx/html;
        index index.html;

        # Health check endpoint
        location /healthz {
            return 200;
        }

        # Serve JSON files directly (prevents SPA fallback from intercepting)
        location ~* \.json$ {
            default_type application/json;
            try_files $uri =404;
        }

        # Default route for SPA or static site
        location / {
            try_files $uri $uri/ /index.html;
        }

        # General media directory
        location /awroberts-media/ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800" always;
            add_header Accept-Ranges bytes;
            try_files $uri =404;
        }

        # Font caching
        location ~* \.ttf$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # Block access to certs
        location ^~ /awroberts-certs/ {
            return 404;
        }
    }
}

