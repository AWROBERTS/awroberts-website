worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Main SPA root
        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            return 200;
        }

        # JSON files should not fall back to index.html
        location ~* \.json$ {
            default_type application/json;
            try_files $uri =404;
        }

        # Static media directory
        location /awroberts-media/ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800" always;
            add_header Accept-Ranges bytes;
            try_files $uri =404;
        }

        # Font caching
        location ~* \.(woff|woff2|ttf)$ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            try_files $uri =404;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
