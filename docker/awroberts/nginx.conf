worker_processes {{ .Values.nginx.workerProcesses }};

events {
    worker_connections {{ .Values.nginx.workerConnections }};
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout {{ .Values.nginx.keepaliveTimeout }};

    server {
        listen {{ .Values.nginx.listenPort }};
        listen [::]:{{ .Values.nginx.listenPort }};
        server_name "{{ .Values.nginx.serverName }}";

        root "{{ .Values.nginx.root }}";
        index "{{ .Values.nginx.index }}";

        # Health check
        location "{{ .Values.livenessProbe.httpGet.path }}" {
            return 200;
        }

        # JSON files should not fall back to index.html
        location ~* \.json$ {
            default_type application/json;
            try_files $uri =404;
        }

        # Fallback image
        location = "{{ .Values.assets.fallbackImagePublicPath }}" {
            alias "{{ .Values.nginx.root }}/awroberts-media/{{ .Values.assets.fallbackImage }}";
            add_header Cache-Control "{{ .Values.assets.fallbackCacheControl }}" always;
        }

        # Private font
        location = "{{ .Values.assets.fontPublicPath }}" {
            alias "{{ .Values.nginx.root }}/awroberts-media/{{ .Values.assets.fontFile }}";
            add_header Cache-Control "{{ .Values.assets.fontCacheControl }}" always;
        }

        # Serve media files (background image, etc.)
        # These are NOT publicly linked, but must be resolvable by p5.js
        location /awroberts-media/ {
            try_files $uri =404;
        }

        # HLS video stream
        location /stream/ {
            try_files $uri =404;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ "/{{ .Values.nginx.index }}";
        }
    }
}
