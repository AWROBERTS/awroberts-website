worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /var/www/html/awroberts/awroberts-media;
        index index.html;

        location /healthz {
            return 200;
        }

        # HLS playlist (.m3u8) — short cache
        location ~* \.m3u8$ {
            add_header Cache-Control "public, max-age=60";
            try_files $uri =404;
        }

        # HLS segments (.ts)
        location ~* \.ts$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Stream route
        location /stream/ {
            alias /var/www/html/awroberts/awroberts-media/hls/;
            try_files $uri =404;
        }

        # Everything else returns 404
        location / {
            return 404;
        }
    }
}
