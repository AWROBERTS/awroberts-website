worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            return 200;
        }

        location /stream/ {
            try_files $uri =404;
        }

        location / {
            return 404;
        }
    }
}