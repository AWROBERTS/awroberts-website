worker_processes {{ .Values.nginx.workerProcesses | default 1 }};

events {
    worker_connections {{ .Values.nginx.workerConnections | default 1024 }};
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout {{ .Values.nginx.keepaliveTimeout | default 65 }};

    server {
        listen {{ .Values.nginx.listenPort | default 80 }};
        listen [::]:{{ .Values.nginx.listenPort | default 80 }};
        server_name {{ .Values.nginx.serverName | default "_" }};

        # SPA root
        root {{ .Values.nginx.root | default "/usr/share/nginx/html" }};
        index {{ .Values.nginx.index | default "index.html" }};

        location {{ .Values.livenessProbe.httpGet.path }} {
            return 200;
        }

        # JSON files should not fall back to index.html
        location ~* \.json$ {
            default_type application/json;
            try_files $uri =404;
        }

        # Fallback image
        location = {{ .Values.assets.fallbackImagePublicPath }} {
            alias {{ .Values.media.mountPath }}/{{ .Values.assets.fallbackImage }};
            add_header Cache-Control "{{ .Values.assets.fallbackCacheControl | default "public, max-age=604800" }}" always;
        }

        # Private font
        location = {{ .Values.assets.fontPublicPath }} {
            alias {{ .Values.media.mountPath }}/{{ .Values.assets.fontFile }};
            add_header Cache-Control "{{ .Values.assets.fontCacheControl | default "public, max-age=31536000, immutable" }}" always;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /{{ .Values.nginx.index | default "index.html" }};
        }
    }
}
