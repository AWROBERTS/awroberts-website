logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--providers.kubernetesgateway=true"
  - "--api.dashboard=true"
  - "--ping=true"

gateway:
  enabled: true

hostNetwork: true

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  capabilities:
    add:
      - NET_BIND_SERVICE

ports:
  web:
    port: 80
    hostPort: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443

  traefik:
    port: 9000
    expose:
      default: false

  metrics:
    port: 9001
    expose:
      default: false

service:
  enabled: true
  type: ClusterIP
