logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

providers:
  kubernetesGateway:
    enabled: true

experimental:
  kubernetesGateway:
    enabled: true

additionalArguments:
  - "--entrypoints.web.address=:80"
  - "--entrypoints.websecure.address=:443"
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"

gateway:
  enabled: false

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP
    nodePort: null

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP
    nodePort: null

  tcp:
    port: 8000
    expose:
      default: false
    protocol: TCP

service:
  enabled: true
  type: LoadBalancer
  loadBalancerIP: "192.168.1.220"
  spec:
    externalTrafficPolicy: Cluster
    allocateLoadBalancerNodePorts: false
  nodePorts:
    web: null
    websecure: null

securityContext:
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: false
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  capabilities:
    drop: []
    add:
      - NET_BIND_SERVICE

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  fsGroup: 0
