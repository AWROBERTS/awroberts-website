logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--providers.kubernetesgateway=true"

gateway:
  enabled: true

hostNetwork: true

deployment:
  enabled: true
  kind: Deployment
  dnsPolicy: ClusterFirstWithHostNet

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP

service:
  enabled: true
  type: ClusterIP
