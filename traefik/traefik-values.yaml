ports:
  web:
    port: 80
    expose:
      default: true
    protocol: TCP
    nodePort: 31509

  websecure:
    port: 443
    expose:
      default: true
    protocol: TCP
    nodePort: 32545

providers:
  kubernetesCRD:
    enabled: false
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

experimental:
  kubernetesGateway:
    enabled: false

service:
  type: NodePort

additionalArguments:
  - "--entryPoints.web.address=:80"
  - "--entryPoints.websecure.address=:443"
