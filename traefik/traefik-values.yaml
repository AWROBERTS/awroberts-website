podSecurity:
  enabled: false

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false

deployment:
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
    allowPrivilegeEscalation: true

hostNetwork: true

additionalArguments:
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--providers.kubernetesgateway=true"

gateway:
  enabled: true

logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

service:
  enabled: true
  type: ClusterIP
