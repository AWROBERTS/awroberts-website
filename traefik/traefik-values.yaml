ports:
  web:
    port: 8000
    expose:
      default: true
    protocol: TCP
    nodePort: 31509

  websecure:
    port: 8443
    expose:
      default: true
    protocol: TCP
    nodePort: 32545

providers:
  kubernetesCRD:
    enabled: false
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true

gateway:
  enabled: false

service:
  type: NodePort
