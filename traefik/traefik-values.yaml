logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--providers.kubernetesgateway=true"

gateway:
  enabled: true

hostNetwork: true

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true

deployment:
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

service:
  enabled: true
  type: ClusterIP
