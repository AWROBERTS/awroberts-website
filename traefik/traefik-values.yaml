logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--api.dashboard=true"
  - "--ping=true"
  - "--providers.kubernetesgateway=true"
  - "--entryPoints.web.address=:80"
  - "--entryPoints.websecure.address=:443"
  - "--entryPoints.websecure.http.tls=true"

gateway:
  enabled: true

rbac:
  enabled: true

ports:
  web:
    port: 80
    hostPort: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443

  traefik:
    port: 9000
    expose:
      default: false

  metrics:
    port: 9001
    expose:
      default: false

service:
  enabled: true
  type: ClusterIP
