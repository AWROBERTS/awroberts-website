logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--providers.kubernetesgateway=true"
  - "--api.dashboard=true"
  - "--ping=true"

gateway:
  enabled: true

hostNetwork: true

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false

ports: {}

deployment:
  additionalContainers:
    - name: traefik
      image: docker.io/traefik:v3.6.12
      args:
        - "--providers.kubernetesgateway=true"
        - "--api.dashboard=true"
        - "--ping=true"
        - "--entryPoints.web.address=:80/tcp"
        - "--entryPoints.websecure.address=:443/tcp"
        - "--entryPoints.traefik.address=:9000/tcp"
        - "--entryPoints.metrics.address=:9001/tcp"
        - "--entryPoints.websecure.http.tls=true"
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: true
        readOnlyRootFilesystem: false
        capabilities:
          add:
            - NET_BIND_SERVICE
      ports:
        - containerPort: 80
          hostPort: 80
          name: web
        - containerPort: 443
          hostPort: 443
          name: websecure
        - containerPort: 9000
          hostPort: 9000
          name: traefik
        - containerPort: 9001
          hostPort: 9001
          name: metrics

service:
  enabled: true
  type: ClusterIP
