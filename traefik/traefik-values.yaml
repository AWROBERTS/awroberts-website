logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

providers: {}

experimental: {}

additionalArguments:
  - "--entrypoints.web.address=:80"
  - "--entrypoints.websecure.address=:443"
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"

gateway:
  enabled: false

hostNetwork: false

deployment:
  enabled: true
  kind: Deployment
  dnsPolicy: ClusterFirst

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP

  tcp:
    port: 8000
    expose:
      default: false
    protocol: TCP

service:
  enabled: true
  type: NodePort
  nodePorts:
    web: 30080
    websecure: 30443

securityContext:
  allowPrivilegeEscalation: true
  readOnlyRootFilesystem: false
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  capabilities:
    drop: []
    add:
      - NET_BIND_SERVICE

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  fsGroup: 0
