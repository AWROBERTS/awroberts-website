logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--api.dashboard=true"
  - "--ping=true"
  - "--providers.kubernetesgateway=true"
  - "--entryPoints.web.address=:80"
  - "--entryPoints.websecure.address=:443"
  - "--entryPoints.websecure.http.tls=true"

gateway:
  enabled: true

rbac:
  enabled: true

hostNetwork: true

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  allowPrivilegeEscalation: true
  capabilities:
    add:
      - NET_BIND_SERVICE

deployment: {}

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

  traefik:
    port: 9000
    expose:
      default: false

  metrics:
    port: 9001
    expose:
      default: false

service:
  enabled: true
  type: NodePort
  ports:
    web:
      port: 80
      nodePort: 30080
    websecure:
      port: 443
      nodePort: 30443

