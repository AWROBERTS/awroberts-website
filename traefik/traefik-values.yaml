logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

providers:
  kubernetesGateway:
    enabled: true

gateway:
  enabled: false

additionalArguments:
  - "--entrypoints.web.address=:80"
  - "--entrypoints.websecure.address=:443"
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP

service:
  type: LoadBalancer

deployment:
  enabled: true
  podSecurityContext:
    runAsUser: 0
  securityContext:
    capabilities:
      add:
        - NET_BIND_SERVICE
