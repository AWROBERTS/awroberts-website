logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--providers.kubernetesgateway=true"
  - "--providers.kubernetesgateway.namespaces=traefik,awroberts"
  - "--entrypoints.websecure.http.tls=true"

gateway:
  enabled: true
  name: traefik

rbac:
  enabled: true

hostNetwork: true

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  allowPrivilegeEscalation: true
  capabilities:
    add:
      - NET_BIND_SERVICE

deployment:
  replicas: 1
  strategy:
    type: Recreate

ports:
  web:
    port: 80
    expose:
      default: true

  websecure:
    port: 443
    expose:
      default: true

  traefik:
    port: 9000
    expose:
      default: false

  metrics:
    port: 9001
    expose:
      default: false

service:
  enabled: true
  spec:
    type: ClusterIP
