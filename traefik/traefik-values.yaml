logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--providers.kubernetesgateway=true"
  - "--entryPoints.web.address=:8080"
  - "--entryPoints.websecure.address=:8443"
  - "--entryPoints.websecure.http.tls=true"
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--api.dashboard=true"
  - "--ping=true"
  - "--entryPoints.traefik.address=:9000"
  - "--entryPoints.metrics.address=:9001"
  - "--metrics.prometheus=true"
  - "--metrics.prometheus.entrypoint=metrics"

gateway:
  enabled: true

hostNetwork: true

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true

ports:
  web:
    port: 8080
    hostPort: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 8443
    hostPort: 443
    expose:
      default: true
    exposedPort: 443

  traefik:
    port: 9000
    expose:
      default: false

  metrics:
    port: 9001
    expose:
      default: false

service:
  enabled: true
  type: ClusterIP
