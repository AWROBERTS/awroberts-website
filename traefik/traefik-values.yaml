logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

additionalArguments:
  - "--entryPoints.web.forwardedHeaders.insecure=true"
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--providers.kubernetesgateway=true"

gateway:
  enabled: true

hostNetwork: true

podSecurityContext:
  runAsUser: 65532
  runAsGroup: 65532
  runAsNonRoot: true

deployment:
  initContainers:
    - name: setcap
      image: docker.io/traefik:v3.6.12
      command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache libcap
          setcap 'cap_net_bind_service=+ep' /usr/local/bin/traefik
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        privileged: true

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

service:
  enabled: true
  type: ClusterIP
