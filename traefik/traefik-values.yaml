logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

providers:
  kubernetesGateway:
    enabled: true

globalArguments:
  - "--entryPoints.websecure.forwardedHeaders.insecure=true"
  - "--entryPoints.web.forwardedHeaders.insecure=true"

ports:
  web:
    expose:
      default: true
    nodePort: 31509
    port: 8000
    protocol: TCP

  websecure:
    expose:
      default: true
    nodePort: 32545
    port: 8443
    protocol: TCP

service:
  type: NodePort
